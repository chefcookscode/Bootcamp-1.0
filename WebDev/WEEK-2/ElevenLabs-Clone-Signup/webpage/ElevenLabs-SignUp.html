<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Simple override to match the specific font look if needed */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-white p-4">

    <div class="flex flex-col relative w-full max-w-[400px] mx-auto">
        
        <header class="flex flex-col gap-3">
            <h1 class="text-2xl text-gray-900 font-semibold text-center">Create an account</h1>
        </header>

        <div class="flex flex-col gap-3 mt-8">
            <div class="relative w-full">
                <button class="whitespace-nowrap font-medium transition-colors duration-75 border hover:bg-gray-50 active:bg-gray-100 hover:border-gray-300 relative flex items-center justify-center gap-2.5 w-full text-sm h-[46px] rounded-xl border-gray-200 text-gray-900">
                    <div class="absolute left-[14px] flex items-center justify-start">
                        <!-- <svg width="20" height="20" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <g clip-path="url(#clip0_google)">
                                <path d="M24.2663 12.7764C24.2663 11.9607 24.2001 11.1406 24.059 10.3381H12.7402V14.9591H19.222C18.953 16.4494 18.0888 17.7678 16.8233 18.6056V21.6039H20.6903C22.9611 19.5139 24.2663 16.4274 24.2663 12.7764Z" fill="#4285F4"></path>
                                <path d="M12.7401 24.5008C15.9766 24.5008 18.7059 23.4382 20.6945 21.6039L16.8276 18.6055C15.7517 19.3375 14.3627 19.752 12.7445 19.752C9.61388 19.752 6.95946 17.6399 6.00705 14.8003H2.0166V17.8912C4.05371 21.9434 8.2029 24.5008 12.7401 24.5008Z" fill="#34A853"></path>
                                <path d="M6.00277 14.8003C5.50011 13.3099 5.50011 11.6961 6.00277 10.2057V7.11481H2.01674C0.314734 10.5056 0.314734 14.5004 2.01674 17.8912L6.00277 14.8003Z" fill="#FBBC04"></path>
                                <path d="M12.7401 5.24966C14.4509 5.2232 16.1044 5.86697 17.3434 7.04867L20.7695 3.62262C18.6001 1.5855 15.7208 0.465534 12.7401 0.500809C8.2029 0.500809 4.05371 3.05822 2.0166 7.11481L6.00264 10.2058C6.95064 7.36173 9.60947 5.24966 12.7401 5.24966Z" fill="#EA4335"></path>
                            </g>
                            <defs>
                                <clipPath id="clip0_google"><rect width="24" height="24" fill="white" transform="translate(0.5 0.5)"></rect></clipPath>
                            </defs>
                        </svg> -->
                    </div>
                    <span>Sign up with Google</span>
                </button>
            </div>
        </div>

        <div class="flex items-center justify-stretch w-full mt-7 mb-4">
            <div class="border-b border-gray-200 w-full"></div>
            <div class="border-b border-gray-200 w-full"></div>
        </div>

        <form action="#" method="POST" class="flex flex-col gap-4">
            
            <div class="relative flex flex-col gap-1">
                <label for="email" class="text-sm font-medium cursor-pointer text-gray-900 mt-2.5 mb-1.5">Email</label>
                <div class="relative">
                    <input class="flex w-full border bg-transparent shadow-none transition-colors placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 hover:border-gray-300 py-1 h-[46px] rounded-xl px-4 text-sm border-gray-200 text-gray-900" 
                    autocomplete="email" required type="email" name="email">
                </div>
            </div>

            <div class="w-full">
                <div class="relative flex flex-col gap-1">
                    <label for="password" class="text-sm font-medium cursor-pointer text-gray-900 mt-2.5 mb-1.5">Password</label>
                    <div class="relative">
                        <input class="flex w-full border bg-transparent shadow-none transition-colors placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 hover:border-gray-300 py-1 h-[46px] rounded-xl px-4 text-sm border-gray-200 text-gray-900 pr-10" 
                        autocomplete="current-password" required type="password" name="password">
                        <button type="button" class="absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="my-2"></div>

            <div class="relative w-full">
                <button class="whitespace-nowrap font-medium transition-colors duration-75 hover:bg-gray-800 active:bg-gray-700 px-4 flex items-center justify-center gap-2.5 text-sm h-[46px] rounded-xl border-gray-200 text-white w-full bg-gray-900">
                    Sign up
                </button>
            </div>
        </form>

        <footer class="flex text-sm text-gray-800 gap-1 items-center justify-center mt-4">
            Already registered?
            <span class="hover:cursor-pointer underline decoration-[1.5px] decoration-gray-300 hover:decoration-current font-medium">Sign in</span>
        </footer>

        <div class="mt-8 pt-6 border-t border-gray-100 flex flex-row items-center justify-center">
            <p class="text-sm text-gray-500 font-medium text-center">
                By continuing, you agree to our 
                <a href="#" class="underline decoration-[1.5px] decoration-gray-300 hover:decoration-current">Terms of Service</a> 
                and 
                <a href="#" class="underline decoration-[1.5px] decoration-gray-300 hover:decoration-current">Privacy Policy</a>.
            </p>
        </div>

    </div>
</body>
</html>
